name: DevOps CI/CD Pipeline

on:
  push:
    branches:
      - dev
      - staging
      - master

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ap-south-1 \
          | docker login --username AWS --password-stdin 754317098062.dkr.ecr.ap-south-1.amazonaws.com

      - name: Build Docker Image
        run: |
          docker build -t observability-app:${{ github.sha }} -f Devops_dev/docker/Dockerfile Devops_dev

      - name: Tag Image
        run: |
          docker tag observability-app:${{ github.sha }} 754317098062.dkr.ecr.ap-south-1.amazonaws.com/observability-app:${{ github.sha }}

      - name: Push Image to ECR
        run: |
          docker push 754317098062.dkr.ecr.ap-south-1.amazonaws.com/observability-app:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-south-1

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region ap-south-1 --name devops-eks-cluster

      # DEV DEPLOYMENT
      - name: Deploy to Dev Environment
        if: github.ref == 'refs/heads/dev'
        run: |
          kubectl set image deployment/observability-app-dev \
          observability-app=754317098062.dkr.ecr.ap-south-1.amazonaws.com/observability-app:${{ github.sha }}

      # STAGING DEPLOYMENT
      - name: Deploy to Staging Environment
        if: github.ref == 'refs/heads/staging'
        run: |
          kubectl set image deployment/observability-app-staging \
          observability-app=754317098062.dkr.ecr.ap-south-1.amazonaws.com/observability-app:${{ github.sha }}

      # PRODUCTION DEPLOYMENT
      - name: Deploy to Production Environment
        if: github.ref == 'refs/heads/master'
        run: |
          kubectl set image deployment/observability-app \
          observability-app=754317098062.dkr.ecr.ap-south-1.amazonaws.com/observability-app:${{ github.sha }}

      # VERIFY DEPLOYMENT
      - name: Verify rollout
        run: |
          kubectl rollout status deployment/observability-app --timeout=120s

      # AUTOMATIC ROLLBACK
      - name: Rollback if deployment fails
        if: failure()
        run: |
          kubectl rollout undo deployment/observability-app