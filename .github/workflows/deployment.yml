name: DevOps CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
        aws-region: ap-south-1

    - name: Login to Amazon ECR
      run: |
        aws ecr get-login-password --region ap-south-1 \
        | docker login --username AWS --password-stdin 754317098062.dkr.ecr.ap-south-1.amazonaws.com

    - name: Build Docker Image
      run: |
        docker build -t observability-app -f Devops_dev/docker/Dockerfile Devops_dev

    - name: Tag Image
      run: |
        docker tag observability-app:latest 754317098062.dkr.ecr.ap-south-1.amazonaws.com/observability-app:latest

    - name: Push Image to ECR
      run: |
        docker push 754317098062.dkr.ecr.ap-south-1.amazonaws.com/observability-app:latest


  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
        aws-region: ap-south-1

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --region ap-south-1 --name devops-eks-cluster

    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f Devops_dev/kubernetes/